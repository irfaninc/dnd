<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drop Links · Download Files</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --border: #252529;
    --accent: #e8ff47;
    --accent-dim: #c8df2a22;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4d6d;
    --success: #47e8a0;
    --warning: #ffb347;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
  }

  /* Background noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.9;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }

  /* Input area */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .input-section:focus-within {
    border-color: var(--accent);
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    resize: none;
    min-height: 120px;
  }

  textarea::placeholder {
    color: #3a3a3f;
  }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .link-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .link-count span {
    color: var(--accent);
    font-weight: 700;
  }

  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* Queue */
  .queue-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .queue-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 5px;
    padding: 4px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  .queue {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .queue-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-icon {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    background: var(--accent-dim);
    border: 1px solid #e8ff4733;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }

  .file-info {
    flex: 1;
    min-width: 0;
  }

  .file-url {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .status-pending { background: #25252a; color: var(--muted); }
  .status-downloading { background: #1a1f0a; color: var(--accent); border: 1px solid #e8ff4733; }
  .status-done { background: #0a1f14; color: var(--success); }
  .status-error { background: #1f0a0d; color: var(--danger); }

  .btn-remove {
    background: none;
    border: none;
    color: #3a3a3f;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .btn-remove:hover { color: var(--danger); }

  /* Progress bar */
  .progress-bar-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 99px;
    margin-top: 6px;
    overflow: hidden;
    display: none;
  }

  .progress-bar-wrap.visible { display: block; }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 99px;
  }

  /* Proxy toggle */
  .proxy-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .proxy-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }

  .toggle {
    appearance: none;
    width: 32px;
    height: 18px;
    background: var(--border);
    border-radius: 99px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }
  .toggle:checked { background: var(--accent); }
  .toggle:checked::after { transform: translateX(14px); }

  .proxy-info { color: #444; margin-left: auto; font-size: 10px; }

  /* Actions */
  .actions {
    display: flex;
    gap: 10px;
  }

  .btn-download-all {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-download-all:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-download-all:active { transform: translateY(0); }
  .btn-download-all:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* Spinning icon when downloading */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 0.8s linear infinite; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #2e2e33;
  }

  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-text { font-family: 'Space Mono', monospace; font-size: 12px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 8px;
    transition: transform 0.25s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">// utility tool</div>
    <h1>Drop <span>&</span><br>Download</h1>
    <p class="subtitle">paste links → grab files</p>
  </header>

  <div class="input-section">
    <div class="input-label">Paste file URLs</div>
    <textarea id="linkInput" placeholder="https://example.com/file.pdf&#10;https://example.com/image.png&#10;https://example.com/data.zip&#10;&#10;One URL per line..."></textarea>
    <div class="input-footer">
      <div class="link-count" id="linkCount"><span>0</span> links detected</div>
      <button class="btn-add" onclick="addToQueue()">Add to Queue</button>
    </div>
  </div>

  <div class="queue-header" id="queueHeader" style="display:none">
    <div class="queue-title">Download Queue</div>
    <button class="btn-clear" onclick="clearQueue()">Clear all</button>
  </div>

  <div class="queue" id="queue">
    <div class="empty" id="emptyState">
      <div class="empty-icon">⬇</div>
      <div class="empty-text">Queue is empty — add some links above</div>
    </div>
  </div>

  <div class="proxy-row">
    <label>
      <input type="checkbox" class="toggle" id="proxyToggle">
      CORS Proxy
    </label>
    <span>Route requests through a proxy to bypass CORS restrictions</span>
    <span class="proxy-info">via corsproxy.io</span>
  </div>

  <div class="actions" id="actionsBar" style="display:none">
    <button class="btn-download-all" id="downloadBtn" onclick="downloadAll()">
      <span id="downloadBtnIcon">⬇</span>
      <span id="downloadBtnText">Download All</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const items = [];
  let idCounter = 0;

  const linkInput = document.getElementById('linkInput');
  const linkCount = document.getElementById('linkCount');
  const queueEl = document.getElementById('queue');
  const queueHeader = document.getElementById('queueHeader');
  const actionsBar = document.getElementById('actionsBar');
  const emptyState = document.getElementById('emptyState');

  linkInput.addEventListener('input', updateCount);

  function updateCount() {
    const links = parseLinks(linkInput.value);
    linkCount.querySelector('span').textContent = links.length;
  }

  function parseLinks(text) {
    return text.split('\n')
      .map(l => l.trim())
      .filter(l => l.startsWith('http://') || l.startsWith('https://'));
  }

  function getFileIcon(url) {
    const ext = url.split('?')[0].split('.').pop().toLowerCase();
    const map = {
      pdf: '📄', zip: '📦', rar: '📦', gz: '📦', tar: '📦',
      jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼', webp: '🖼', svg: '🖼',
      mp4: '🎬', mov: '🎬', avi: '🎬', mkv: '🎬',
      mp3: '🎵', wav: '🎵', flac: '🎵',
      doc: '📝', docx: '📝', xls: '📊', xlsx: '📊', ppt: '📋', pptx: '📋',
      csv: '📊', json: '🔢', xml: '🔢', sql: '🗄',
      exe: '⚙️', dmg: '💿', iso: '💿',
    };
    return map[ext] || '📁';
  }

  function getFileName(url) {
    try {
      const path = new URL(url).pathname;
      const name = path.split('/').pop();
      return name || 'file';
    } catch { return 'file'; }
  }

  function addToQueue() {
    const links = parseLinks(linkInput.value);
    if (!links.length) { showToast('No valid URLs detected.'); return; }

    links.forEach(url => {
      const id = ++idCounter;
      items.push({ id, url, status: 'pending' });
      renderItem(id, url);
    });

    linkInput.value = '';
    updateCount();
    queueHeader.style.display = 'flex';
    actionsBar.style.display = 'flex';
    emptyState.style.display = 'none';
    showToast(`Added ${links.length} link${links.length > 1 ? 's' : ''} to queue`);
  }

  function renderItem(id, url) {
    const el = document.createElement('div');
    el.className = 'queue-item';
    el.id = `item-${id}`;
    el.innerHTML = `
      <div class="file-icon">${getFileIcon(url)}</div>
      <div class="file-info">
        <div class="file-url" title="${url}">${url}</div>
        <div class="file-meta">${getFileName(url)}</div>
        <div class="progress-bar-wrap" id="prog-${id}">
          <div class="progress-bar" id="bar-${id}"></div>
        </div>
      </div>
      <span class="status-badge status-pending" id="badge-${id}">PENDING</span>
      <button class="btn-remove" onclick="removeItem(${id})" title="Remove">✕</button>
    `;
    queueEl.appendChild(el);
  }

  function removeItem(id) {
    const idx = items.findIndex(i => i.id === id);
    if (idx !== -1) items.splice(idx, 1);
    const el = document.getElementById(`item-${id}`);
    if (el) el.remove();
    if (!items.length) {
      emptyState.style.display = 'block';
      queueHeader.style.display = 'none';
      actionsBar.style.display = 'none';
    }
  }

  function clearQueue() {
    items.length = 0;
    queueEl.innerHTML = '';
    queueEl.appendChild(emptyState);
    emptyState.style.display = 'block';
    queueHeader.style.display = 'none';
    actionsBar.style.display = 'none';
  }

  function setStatus(id, status) {
    const badge = document.getElementById(`badge-${id}`);
    if (!badge) return;
    const labels = { pending: 'PENDING', downloading: 'DOWNLOADING', done: 'DONE', error: 'ERROR' };
    badge.className = `status-badge status-${status}`;
    badge.textContent = labels[status] || status.toUpperCase();
  }

  async function downloadFile(item) {
    setStatus(item.id, 'downloading');
    const prog = document.getElementById(`prog-${item.id}`);
    const bar = document.getElementById(`bar-${item.id}`);
    if (prog) prog.classList.add('visible');

    // Animate progress bar
    let progress = 0;
    const progressInterval = setInterval(() => {
      progress = Math.min(progress + Math.random() * 15, 90);
      if (bar) bar.style.width = progress + '%';
    }, 200);

    const useProxy = document.getElementById('proxyToggle').checked;
    const fetchUrl = useProxy ? `https://corsproxy.io/?url=${encodeURIComponent(item.url)}` : item.url;

    try {
      const response = await fetch(fetchUrl);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const blob = await response.blob();
      clearInterval(progressInterval);
      if (bar) bar.style.width = '100%';

      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = getFileName(item.url);
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);

      setStatus(item.id, 'done');
      item.status = 'done';
    } catch (err) {
      clearInterval(progressInterval);
      if (bar) bar.style.width = '0%';
      if (prog) prog.classList.remove('visible');
      setStatus(item.id, 'error');
      item.status = 'error';
      console.error(`Failed to download ${item.url}:`, err);
    }
  }

  async function downloadAll() {
    const pending = items.filter(i => i.status === 'pending' || i.status === 'error');
    if (!pending.length) { showToast('Nothing to download.'); return; }

    const btn = document.getElementById('downloadBtn');
    const btnIcon = document.getElementById('downloadBtnIcon');
    const btnText = document.getElementById('downloadBtnText');
    btn.disabled = true;
    btnIcon.className = 'spin';
    btnIcon.textContent = '↻';
    btnText.textContent = `Downloading 0 / ${pending.length}`;

    let done = 0, failed = 0;
    for (const item of pending) {
      await downloadFile(item);
      item.status === 'done' ? done++ : failed++;
      btnText.textContent = `Downloading ${done + failed} / ${pending.length}`;
      await new Promise(r => setTimeout(r, 400));
    }

    btn.disabled = false;
    btnIcon.className = '';
    btnIcon.textContent = '⬇';
    btnText.textContent = 'Download All';
    if (done && !failed) showToast(`Done! ${done} file${done > 1 ? 's' : ''} downloaded.`);
    else if (done && failed) showToast(`${done} downloaded, ${failed} failed.`);
    else showToast(`All ${failed} download${failed > 1 ? 's' : ''} failed.`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  updateCount();
</script>
</body>
</html>
